name: CI/CD Pipeline

on:
  push:
    branches:
      - master
      - main
      - 'release/**'
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

# NOTE: env context is NOT available in reusable workflow `with` inputs.
# Inline values directly or use the `vars` context (repository variables).

jobs:
  build:
    uses: davidsugianto/shared-workflows/.github/workflows/go-docker-ci.yaml@master
    with:
      go-version: "1.25"
      image-name: docker.io/<your-dockerhub-username>/<your-service-name>
      run-tests: true
      push-image: ${{ github.event_name != 'pull_request' }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  deploy-dev:
    needs: build
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    uses: davidsugianto/shared-workflows/.github/workflows/kustomize-image-tag.yaml@master
    with:
      gitops-repo: <your-org>/<your-gitops-repo>
      image: docker.io/<your-dockerhub-username>/<your-service-name>
      tag: ${{ needs.build.outputs.image-tag }}
      kustomize-path: environments/dev/<your-service-name>
      create-pr: true
    secrets:
      git-token: ${{ secrets.PAT_TOKEN }}

  deploy-staging:
    needs: build
    if: startsWith(github.ref, 'refs/heads/release/')
    uses: davidsugianto/shared-workflows/.github/workflows/kustomize-image-tag.yaml@master
    with:
      gitops-repo: <your-org>/<your-gitops-repo>
      image: docker.io/<your-dockerhub-username>/<your-service-name>
      tag: ${{ needs.build.outputs.image-tag }}
      kustomize-path: environments/staging/<your-service-name>
      create-pr: true
    secrets:
      git-token: ${{ secrets.PAT_TOKEN }}

  deploy-prod:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    uses: davidsugianto/shared-workflows/.github/workflows/kustomize-image-tag.yaml@master
    with:
      gitops-repo: <your-org>/<your-gitops-repo>
      image: docker.io/<your-dockerhub-username>/<your-service-name>
      tag: ${{ needs.build.outputs.image-tag }}
      kustomize-path: environments/prod/<your-service-name>
      create-pr: true
    secrets:
      git-token: ${{ secrets.PAT_TOKEN }}
