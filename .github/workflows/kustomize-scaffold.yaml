name: Generate Service Scaffold

on:
  workflow_call:
    inputs:
      gitops-repo:
        description: 'GitOps repository (format: owner/repo)'
        required: true
        type: string
      gitops-branch:
        description: 'GitOps repository branch'
        required: false
        type: string
        default: 'main'
      service-name:
        description: 'Name of the service to scaffold'
        required: true
        type: string
      image-name:
        description: 'Full image name (e.g., ghcr.io/owner/app)'
        required: true
        type: string
      create-pr:
        description: 'Create Pull Request'
        required: false
        type: boolean
        default: true
    secrets:
      git-token:
        description: 'GitHub token with repo access'
        required: true
    outputs:
      pr-url:
        description: 'Pull Request URL'
        value: ${{ jobs.scaffold.outputs.pr-url }}

jobs:
  scaffold:
    name: Generate Scaffold
    runs-on: ubuntu-latest
    outputs:
      pr-url: ${{ steps.pr.outputs.pr-url }}
    
    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.gitops-repo }}
          ref: ${{ inputs.gitops-branch }}
          token: ${{ secrets.git-token }}
          path: gitops

      - name: Generate scaffold
        run: |
          cd gitops
          
          # Run the scaffold script (assuming it exists in scripts/)
          if [ -f "scripts/generate-service-scaffold.sh" ]; then
            chmod +x scripts/generate-service-scaffold.sh
            ./scripts/generate-service-scaffold.sh ${{ inputs.service-name }}
          else
            echo "❌ Scaffold script not found in GitOps repo"
            exit 1
          fi

      - name: Create PR
        id: pr
        if: inputs.create-pr == true
        run: |
          cd gitops
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          BRANCH_NAME="scaffold/${{ inputs.service-name }}"
          git checkout -b "$BRANCH_NAME"
          
          git add .
          git commit -m "feat: add ${{ inputs.service-name }} scaffold

          - Service: ${{ inputs.service-name }}
          - Image: ${{ inputs.image-name }}
          - Generated by: ${{ github.actor }}"
          
          git push origin "$BRANCH_NAME"
          
          PR_URL=$(gh pr create \
            --title "🆕 Add ${{ inputs.service-name }} scaffold" \
            --body "## New Service Scaffold
            
            ### Service Details
            - **Name:** ${{ inputs.service-name }}
            - **Image:** \`${{ inputs.image-name }}\`
            
            ### Generated Files
            - \`bases/${{ inputs.service-name }}/\`
            - \`environments/dev/${{ inputs.service-name }}/\`
            - \`environments/staging/${{ inputs.service-name }}/\`
            - \`environments/prod/${{ inputs.service-name }}/\`
            
            ### Next Steps
            - [ ] Review generated manifests
            - [ ] Customize environment-specific values
            - [ ] Verify ArgoCD ApplicationSet detects new service
            - [ ] Merge to deploy to dev/staging" \
            --base ${{ inputs.gitops-branch }} \
            --head "$BRANCH_NAME" \
            --label "automated,scaffold,new-service")
          
          echo "pr-url=$PR_URL" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.git-token }}