name: Go CI Pipeline

# 1. Trigger: workflow_call makes this a reusable workflow
on:
  workflow_call:
    inputs:
      go-version:
        description: "The Go version to use for building and testing"
        required: false
        type: string
        default: "1.22"
      image-name:
        description: "The full Docker Hub image name (e.g., username/app-name)"
        required: true
        type: string
      run-tests:
        description: "Whether to run go test before building"
        required: false
        type: boolean
        default: true
    secrets:
      DOCKERHUB_USERNAME:
        description: "Docker Hub username"
        required: true
      DOCKERHUB_TOKEN:
        description: "Docker Hub access token"
        required: true

# 2. Security: Principle of Least Privilege
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------
  # JOB 1: Shift-Left Validation
  # ---------------------------------------------------------
  test:
    name: Run Go Tests
    if: ${{ inputs.run-tests }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          cache: true

      - name: Run Go Tests
        run: go test -v ./...

  # ---------------------------------------------------------
  # JOB 2: Build & Push (Gated by Job 1)
  # ---------------------------------------------------------
  build-and-push:
    name: Build & Push Docker Image
    needs: test
    # If tests are skipped, we still want to build.
    # The 'always()' or checking the result of 'test' handles this.
    if: ${{ always() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image-name }}
          tags: |
            type=ref,event=pr
            type=ref,event=branch
            type=sha
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
